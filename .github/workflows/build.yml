name: Build and Test

on:
  push:
  pull_request:

jobs:
  ubuntu-wrapper-e2e:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++ libglpk-dev coinor-cbc coinor-libcbc-dev libzip-dev libprotobuf-dev protobuf-compiler python3
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel 2
      - name: CTest
        run: ctest --test-dir build --output-on-failure
      - name: Wrapper help
        run: PYTHONPATH=wrapper PATH="$PWD/scripts:$PWD/build:$PATH" loom-map --help
      - name: Wrapper version
        run: PYTHONPATH=wrapper PATH="$PWD/scripts:$PWD/build:$PATH" loom-map --version
      - name: End-to-end tiny GTFS
        run: tests/run_e2e.sh
      - name: Verify SVG
        run: test -s tests/tiny-gtfs.svg && python3 - <<'PY'
from pathlib import Path
assert b'<svg' in Path('tests/tiny-gtfs.svg').read_bytes()[:4096].lower()
PY

  docker-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Build Docker image
        run: docker build -t loom-map .
      - name: Docker wrapper help
        run: docker run --rm loom-map --help
